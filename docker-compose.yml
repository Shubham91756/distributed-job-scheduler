version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: job_scheduler_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: job_scheduler
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: job_scheduler_backend
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/job_scheduler
      - JWT_SECRET=super_secret_local_dev_key
      - JWT_EXPIRES_IN=7d
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: job_scheduler_worker
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/job_scheduler
      - WORKER_CONCURRENCY=5
      - WORKER_QUEUE_ID=all
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    container_name: job_scheduler_daemon
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/job_scheduler
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: job_scheduler_frontend
    ports:
      - '8080:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
